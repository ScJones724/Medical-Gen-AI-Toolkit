<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Med-Pulse AI | Senior Registrar</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-600 via-indigo-700 to-purple-900 flex items-center justify-center min-h-screen font-sans p-4">

    <div class="bg-white/20 backdrop-blur-2xl p-10 rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.3)] max-w-md w-full text-center border border-white/30">
        
        <div class="mb-6">
            <h1 class="text-4xl font-black mb-1 text-white tracking-tighter drop-shadow-lg">🩺 Med-Pulse AI</h1>
            <p class="text-blue-200 text-[10px] font-bold uppercase tracking-[0.4em] opacity-80">High-Concurrency Toolkit</p>
        </div>
        
        <button hx-get="/get-tip" 
                hx-target="#response-box" 
                hx-indicator="#loading"
                class="bg-white hover:bg-blue-50 text-indigo-900 font-black py-5 px-10 rounded-2xl shadow-xl transition-all active:scale-95 hover:shadow-white/20 text-sm uppercase tracking-widest">
            Summon Clinical Wisdom
        </button>

        <div id="response-box" class="mt-10 min-h-[140px] flex items-center justify-center bg-black/10 rounded-3xl p-6 border border-white/10 transition-all duration-700">
            <p class="text-white/60 italic text-sm">Consultation room is open. Request a pearl...</p>
        </div>

        <div id="loading" class="htmx-indicator mt-8">
            <div class="flex flex-col items-center gap-4">
                <div class="w-10 h-10 border-4 border-white/20 border-t-white rounded-full animate-spin"></div>
                <p class="text-white font-black text-[10px] tracking-[0.5em] animate-pulse">PAGING SENIOR REGISTRAR...</p>
            </div>
        </div>
    </div>
</body>
</html>

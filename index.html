<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Medical AI Toolkit</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center h-screen font-sans">
    <div class="bg-white p-10 rounded-2xl shadow-xl max-w-md w-full text-center border-t-8 border-blue-600">
        <h1 class="text-3xl font-bold mb-2 text-slate-800">🩺 Medical Gen AI</h1>
        <p class="text-slate-500 mb-8 text-sm uppercase tracking-widest">Clinical Fact Generator</p>
        
        <button hx-get="/get-tip" 
                hx-target="#response-box" 
                hx-indicator="#loading"
                class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transition active:scale-95">
            Generate Clinical Tip
        </button>

        <div id="response-box" class="mt-8 min-h-[80px] flex items-center justify-center border-2 border-dashed border-slate-200 rounded-lg p-4">
            <p class="text-slate-400 italic text-sm">Click the button for a clinical pearl...</p>
        </div>

        <div id="loading" class="htmx-indicator mt-4 text-blue-500 font-bold animate-pulse text-sm">
            I know this one. Let me make sure I'm not gaslighting myself...
        </div>
    </div>
</body>
</html>
